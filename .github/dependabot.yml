version: 2

updates:
  # Python (pip) dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    ignore:
      # Ignore major version bumps for SQLAlchemy as they require migration
      - dependency-name: "sqlalchemy"
        update-types: ["version-update:semver-major"]
    groups:
      # Group all dev/test dependencies together
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "types-*"
          - "httpx"
          - "bandit"
          - "pre-commit"
          - "testcontainers*"
          - "pg8000"
          - "docker"
          - "playwright"
          - "pytest-playwright"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
